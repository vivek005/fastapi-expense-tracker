<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div class="max-w-4xl mx-auto py-10 px-4">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Expense Tracker <span class="text-blue-600">Pro</span></h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 uppercase font-semibold">Total Spent</p>
                <h2 id="total-amount" class="text-4xl font-bold text-gray-900 mb-6">₹0.00</h2>
    
                <div class="pt-6 border-t border-gray-100">
                    <h3 class="text-sm font-bold mb-4 text-gray-800 uppercase">Spending by Category</h3>
                    <div id="category-list" class="space-y-3 text-sm">
                        </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 mb-10">
            <h3 class="text-lg font-semibold mb-4">Add New Expense</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input id="item" type="text" placeholder="Item (e.g. Pizza)" class="border p-2 rounded-lg">
                <input id="amount" type="number" placeholder="Amount" class="border p-2 rounded-lg">
                <input id="category" type="text" placeholder="Category" class="border p-2 rounded-lg">
                <button onclick="addExpense()" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">Add</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b text-sm">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-gray-700">Date</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Item</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Category</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-right">Amount</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="expense-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        async function updateDashboard() {
            try {
                // 1. Update Total
                const resTotal = await fetch(`${API_URL}/expenses/total`);
                const dataTotal = await resTotal.json();
                const formatter = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' });
                document.getElementById('total-amount').innerText = formatter.format(dataTotal.total_spent);
                
                // 2. Update Category Breakdown
                await updateCategoryUI(); 

                // 3. Update Expense Table
                const listRes = await fetch(`${API_URL}/expenses/`);
                const expenses = await listRes.json();
                const listElement = document.getElementById('expense-list');
                
                listElement.innerHTML = expenses.map(exp => `
                    <tr class="border-b hover:bg-gray-50 transition text-sm">
                        <td class="px-6 py-4 text-gray-400 font-mono">${exp.date}</td>
                        <td class="px-6 py-4 font-medium text-gray-800">${exp.notes}</td>
                        <td class="px-6 py-4 text-gray-500">${exp.category}</td>
                        <td class="px-6 py-4 text-right font-bold text-blue-600">₹${parseFloat(exp.amount).toFixed(2)}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="deleteExpense(${exp.id})" class="text-red-500 hover:text-red-700 font-bold transition">
                                Delete
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Dashboard update failed:", error);
            }
        }

        async function addExpense() {
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const notes = document.getElementById('item').value;

            if (!amount || !category || !notes) {
                alert("Please fill all fields");
                return;
            }

            const res = await fetch(`${API_URL}/expenses/`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    amount: parseFloat(amount), 
                    category, 
                    notes, 
                    date: new Date().toISOString().split('T')[0] 
                })
            });

            if (res.ok) {
                updateDashboard();
                document.getElementById('amount').value = "";
                document.getElementById('item').value = "";
                document.getElementById('category').value = "";
            }
        }

        async function deleteExpense(id) {
            if (confirm("Are you sure you want to delete this expense?")) {
                const res = await fetch(`${API_URL}/expenses/${id}`, { method: "DELETE" });
                if (res.ok) {
                    updateDashboard();
                }
            }
        }

        async function updateCategoryUI() {
            try {
                const response = await fetch(`${API_URL}/expenses/categories`);
                const categories = await response.json();
                const listElement = document.getElementById('category-list');
                listElement.innerHTML = ''; 

                if (categories.length === 0) {
                    listElement.innerHTML = '<p class="text-gray-500">No data available yet.</p>';
                    return;
                }

                categories.forEach(item => {
                    const row = document.createElement('div');
                    row.className = "flex justify-between items-center border-b pb-2";
                    row.innerHTML = `
                        <span class="font-medium text-gray-700">${item.category}</span>
                        <span class="text-blue-600 font-bold">₹${parseFloat(item.total).toLocaleString('en-IN')}</span>
                    `;
                    listElement.appendChild(row);
                });
            } catch (error) {
                console.error("Failed to fetch categories:", error);
            }
        }

        window.addEventListener('DOMContentLoaded', updateDashboard);
    </script>
</body>
</html>
