<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div class="max-w-4xl mx-auto py-10 px-4">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Expense Tracker <span class="text-blue-600">Pro</span></h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 uppercase font-semibold">Total Spent</p>
                <h2 id="total-amount" class="text-4xl font-bold text-gray-900">₹0.00</h2>
            </div>
        </div>

        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 mb-10">
            <h3 class="text-lg font-semibold mb-4">Add New Expense</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input id="item" type="text" placeholder="Item (e.g. Pizza)" class="border p-2 rounded-lg">
                <input id="amount" type="number" placeholder="Amount" class="border p-2 rounded-lg">
                <input id="category" type="text" placeholder="Category" class="border p-2 rounded-lg">
                <button onclick="addExpense()" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">Add</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b text-sm">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-gray-700">Date</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Item</th>
                        <th class="px-6 py-4 font-semibold text-gray-700">Category</th>
                        <th class="px-6 py-4 font-semibold text-gray-700 text-right">Amount</th>
                        <th class="px-6 py-4"></th>
                    </tr>
                </thead>
                <tbody id="expense-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

// 1. Get and show the total
async function updateDashboard() {
    const res = await fetch(`${API_URL}/expenses/total`);
    const data = await res.json();
    
    // Replace your total amount line with this for proper Indian formatting:
const formatter = new Intl.NumberFormat('en-IN', {
    style: 'currency',
    currency: 'INR',
});

document.getElementById('total-amount').innerText = formatter.format(data.total_spent);
    
    const listRes = await fetch(`${API_URL}/expenses/`);
    const expenses = await listRes.json();
    const listElement = document.getElementById('expense-list');
    listElement.innerHTML = ""; // Clear old list

    expenses.forEach(exp => {
        listElement.innerHTML += `
            <tr class="border-b hover:bg-gray-50 transition text-sm">
                <td class="px-6 py-4 text-gray-400 font-mono">${exp.date}</td>
                <td class="px-6 py-4 font-medium text-gray-800">${exp.notes}</td>
                <td class="px-6 py-4 text-gray-500">${exp.category}</td>
                <td class="px-6 py-4 text-right font-bold text-blue-600">₹${parseFloat(exp.amount).toFixed(2)}</td>
                <td class="px-6 py-4 text-right">
                    <button onclick="deleteExpense(${exp.id})" class="text-red-500 hover:text-red-700 font-bold">Delete</button>
                </td>
            </tr>
        `;
    });
}

// 2. Add a new expense
async function addExpense() {
    const amount = document.getElementById('amount').value;
    const category = document.getElementById('category').value;
    const notes = document.getElementById('item').value;

    const res = await fetch(`${API_URL}/expenses/`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount, category, notes, date: new Date().toISOString().split('T')[0] })
    });

    if (res.ok) {
        updateDashboard(); // Refresh the UI
        document.getElementById('amount').value = ""; // Clear inputs
        document.getElementById('item').value = "";
    }
}

// 3. Delete an expense
async function deleteExpense(id) {
    await fetch(`${API_URL}/expenses/${id}`, { method: "DELETE" });
    updateDashboard();
}

// Run this as soon as the page loads
updateDashboard();
    </script>
</body>
</html>
